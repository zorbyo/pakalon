[gh_post_comment]
description = "Post a comment on the inbound thread (PR for PR conversations/reviews, originating issue otherwise). Pass `number` ONLY to post elsewhere."

[gh_post_comment.parameters]
body = "Markdown comment body."
number = "Optional issue/PR override. Defaults to the inbound thread."

[gh_push_branch]
description = "Push the workspace branch to origin. Pre-publish gate (when the repo defines them): `bun run fix` → auto-commit any formatter diff as `style: bun run fix` → `bun check`. On `bun check` failure, fix the cause and retry. Pre-existing breakage on `main` against the same paths NOT caused by your diff → retry with `skip_checks=true` and document the bypass in the follow-up comment. Dirty-tree gate runs unconditionally."

[gh_push_branch.parameters]
branch = "Optional branch override; defaults to the workspace branch."
skip_checks = "Bypass `bun run fix` + `bun check`. Use ONLY after verifying (e.g. `git diff origin/<default>..HEAD` against the failing paths) the failure exists on `main` and is NOT caused by your diff. Dirty-tree gate still runs — commit everything first."

[gh_open_pr]
description = "Open a PR from the workspace branch using the four-section body template. Same pre-publish gate as `gh_push_branch`: `bun run fix` → auto-commit formatter diff as `style: bun run fix` → `bun check`. On failure, fix and retry. Pre-existing `main` breakage NOT caused by your diff → `skip_checks=true` and document the bypass in the PR's `## Verification` section."

[gh_open_pr.parameters]
body = "Markdown body. MUST contain the four template sections in order: `## Repro`, `## Cause`, `## Fix`, `## Verification`."
base = "Optional base branch override (default: repo default)."
skip_checks = "Bypass `bun run fix` + `bun check`. Use ONLY after verifying the failure exists on `main` and is NOT caused by your diff. When set, document in `## Verification` (e.g. ``Skipped pre-publish gate: `bun check` fails on `main` due to <link>``). Dirty-tree gate still runs."

[gh_request_review]
description = "Request reviewers and/or add assignees on the open PR."

[repro_record]
description = "Persist a reproduction transcript (command, output, exit code) for the issue."

[repro_record.parameters]
reproduced = "True when the recorded run demonstrates the bug."

[mark_unable_to_reproduce]
description = "Close the loop without a PR: comment with diagnosis + info request, mark issue abandoned."

[abort_task]
description = "Irrecoverably abandon this task WITHOUT posting any visible message. Use ONLY for orchestrator/environment defects you cannot work around (broken filesystem permissions, missing system tools, corrupted git metadata, harness bugs). NEVER for normal workflow problems — failed builds, missing repro info, unclear requests use `gh_post_comment` or `mark_unable_to_reproduce` instead. `reason` is audit-only and NEVER shown to the reporter."

[abort_task.parameters]
reason = "Internal diagnosis for the operator. Concrete, specific, blameless. NEVER shown to the reporter."

[fetch_issue_thread]
description = "Refetch the originating issue and its comments. Use sparingly."

[set_issue_labels]
description = "Append labels to the originating issue/PR. NEVER removes existing labels."

[set_issue_labels.parameters]
number = "Optional override; defaults to the originating issue."

[classify_issue]
description = "First triage step. Classify the issue, apply labels on GitHub, pick the workflow branch (bug → repro+fix+PR, question → reply only, etc.). MUST be called before any other `gh_*` action on a new issue."

[classify_issue.parameters]
primary = "Exactly one primary classification."
priority = "REQUIRED when `primary=='bug'`; one of `prio:p0..p3`. Omit the field for any other primary — orchestrator silently drops stray values."
functional = "Zero or more functional labels. Unknown values dropped silently; omit the field when none apply."
provider = "Only when provider-scoped; format `provider:<name>`. Omit otherwise."
platform = "Only when platform materially affects reproduction; one of `platform:linux|macos|windows|wsl`. Omit otherwise."
rationale = "One sentence explaining the classification."
branch_slug = "Kebab-case slug, 1-50 chars `[a-z0-9-]`, no leading/trailing/double hyphen. Replaces the auto-generated slug in the working branch name. Provide for `bug`/`documentation`. Omit for non-PR workflows (`question`, `enhancement`, `proposal`, `invalid`, `duplicate`)."

[classify_issue.next_steps]
bug = "reproduce → diagnose → fix → PR"
documentation = "fix the docs and open a PR using the four-section template"
question = "answer in a single gh_post_comment; no PR, no repro"
enhancement = "post one thoughtful gh_post_comment on feasibility/scope; no PR"
proposal = "post one thoughtful gh_post_comment on feasibility/scope; no PR"
invalid = "post one explanatory gh_post_comment; no further action"
duplicate = "post one explanatory gh_post_comment; no further action"
