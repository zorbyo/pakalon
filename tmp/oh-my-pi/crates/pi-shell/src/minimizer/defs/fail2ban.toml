# fail2ban-client status output. Strip ANSI, blank lines, and ascii banner rules.

[filters.fail2ban]
description = "Compact fail2ban-client output"
match_command = "^fail2ban-client$"
strip_ansi = true
strip_lines_matching = [
	"^\\s*$",
	"^[\\s`|\\-]+$",
]
truncate_lines_at = 200
max_lines = 80
on_empty = "fail2ban: ok"

[[tests.fail2ban]]
name = "strips banner keeps status"
input = "Status\n|- Number of jail:\t2\n`- Jail list:\tsshd, nginx\n"
expected = "Status\n|- Number of jail:\t2\n`- Jail list:\tsshd, nginx\n"

[[tests.fail2ban]]
name = "empty becomes sentinel"
input = "\n   \n"
expected = "fail2ban: ok"
