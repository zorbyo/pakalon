# Ported from https://github.com/rtk-ai/rtk/blob/master/src/filters/jq.toml
# match_command adapted for the local (program, subcommand) dispatch model.

[filters.jq]
description = "Compact jq output — truncate large JSON results"
match_command = "^jq$"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
max_lines = 40
truncate_lines_at = 120

[[tests.jq]]
name = "short output passes through"
input = """
{
  "name": "test",
  "version": "1.0"
}
"""
expected = "{\n  \"name\": \"test\",\n  \"version\": \"1.0\"\n}\n"

[[tests.jq]]
name = "empty input passes through"
input = ""
expected = ""
