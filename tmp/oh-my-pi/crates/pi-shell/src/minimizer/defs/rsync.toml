# rsync -v / -av output. Long file lists collapse to head+tail; the trailing
# summary block (sent/received/speedup/total size) stays in the tail.

[filters.rsync]
description = "Compact rsync transfer logs"
match_command = "^rsync$"
strip_ansi = true
strip_lines_matching = [
	"^sending incremental file list$",
	"^receiving incremental file list$",
]
truncate_lines_at = 250
head_lines = 5
tail_lines = 15
max_lines = 40
on_empty = "rsync: ok"

[[tests.rsync]]
name = "strips incremental banner"
input = "sending incremental file list\nfile1\nfile2\nsent 200 bytes  received 20 bytes\ntotal size is 1024  speedup is 4.65\n"
expected = "file1\nfile2\nsent 200 bytes  received 20 bytes\ntotal size is 1024  speedup is 4.65\n"
