# iptables -L / -S output. Big tables stay head/tail compact.

[filters.iptables]
description = "Compact iptables rule listings"
match_command = "^(ip6?tables|iptables-save|ip6tables-save)$"
strip_ansi = true
truncate_lines_at = 250
head_lines = 40
tail_lines = 20
max_lines = 80
on_empty = "iptables: empty"

[[tests.iptables]]
name = "small listing passes through"
input = "Chain INPUT (policy ACCEPT 0 packets, 0 bytes)\n pkts bytes target     prot opt in     out     source               destination\n"
expected = "Chain INPUT (policy ACCEPT 0 packets, 0 bytes)\n pkts bytes target     prot opt in     out     source               destination\n"
