# Ported from https://github.com/rtk-ai/rtk/blob/master/src/filters/mix-format.toml
# match_command adapted for the local (program, subcommand) dispatch model.

[filters.mix-format]
description = "Compact mix format output"
match_command = "^mix$"
match_subcommand = "^format$"
on_empty = "mix format: ok"
max_lines = 20

[[tests.mix-format]]
name = "empty output returns ok"
input = ""
expected = "mix format: ok"

[[tests.mix-format]]
name = "changed files pass through"
input = "lib/my_app.ex\ntest/my_app_test.exs"
expected = "lib/my_app.ex\ntest/my_app_test.exs"
