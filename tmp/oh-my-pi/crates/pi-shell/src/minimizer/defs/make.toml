# Ported from https://github.com/rtk-ai/rtk/blob/master/src/filters/make.toml
# match_command adapted for the local (program, subcommand) dispatch model.

[filters.make]
description = "Compact make output"
match_command = "^make$"
strip_lines_matching = [
  "^make\\[\\d+\\]:",
  "^\\s*$",
  "^Nothing to be done",
]
max_lines = 50
on_empty = "make: ok"

[[tests.make]]
name = "strips entering/leaving lines"
input = """
make[1]: Entering directory '/home/user'
gcc -O2 foo.c
make[1]: Leaving directory '/home/user'
"""
expected = """
gcc -O2 foo.c
"""

[[tests.make]]
name = "strips blank lines"
input = """
gcc -O2 foo.c

gcc -O2 bar.c
"""
expected = """
gcc -O2 foo.c
gcc -O2 bar.c
"""

[[tests.make]]
name = "on_empty when all stripped"
input = """
make[1]: Entering directory '/home/user'
make[1]: Leaving directory '/home/user'
"""
expected = "make: ok"
