# Ported from https://github.com/rtk-ai/rtk/blob/master/src/filters/terraform-plan.toml
# match_command adapted for the local (program, subcommand) dispatch model.

[filters.terraform-plan]
description = "Compact Terraform plan output"
match_command = "^terraform$"
match_subcommand = "^plan$"
strip_ansi = true
strip_lines_matching = [
  "^Refreshing state",
  "^\\s*#.*unchanged",
  "^\\s*$",
  "^Acquiring state lock",
  "^Releasing state lock",
]
max_lines = 80
on_empty = "terraform plan: no changes detected"

[[tests.terraform-plan]]
name = "strips Refreshing state lines and blank lines"
input = """
Acquiring state lock. This may take a few moments...
Refreshing state... [id=vpc-abc]
Refreshing state... [id=sg-123]
Releasing state lock. This may take a few moments...

Terraform will perform the following actions:

  # aws_instance.web will be created
  + resource "aws_instance" "web" {}

Plan: 1 to add, 0 to change, 0 to destroy.
"""
expected = "Terraform will perform the following actions:\n  # aws_instance.web will be created\n  + resource \"aws_instance\" \"web\" {}\nPlan: 1 to add, 0 to change, 0 to destroy.\n"

[[tests.terraform-plan]]
name = "strips noise, preserves non-blank content"
input = "Refreshing state... [id=vpc-abc]\nNo changes. Your infrastructure matches the configuration."
expected = "No changes. Your infrastructure matches the configuration.\n"
