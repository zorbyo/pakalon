# Ported from https://github.com/rtk-ai/rtk/blob/master/src/filters/shellcheck.toml
# match_command adapted for the local (program, subcommand) dispatch model.

[filters.shellcheck]
description = "Compact shellcheck output — strip blank lines, keep caret indicators for error position"
match_command = "^shellcheck$"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
]
max_lines = 50

[[tests.shellcheck]]
name = "multi-warning output stripped of blank lines only"
input = """
In script.sh line 3:
if [[ $1 == "" ]]
     ^-- SC2236: Use -z instead of ! -n.

In script.sh line 7:
echo $var
     ^-- SC2086: Double quote to prevent globbing.

"""
expected = "In script.sh line 3:\nif [[ $1 == \"\" ]]\n     ^-- SC2236: Use -z instead of ! -n.\nIn script.sh line 7:\necho $var\n     ^-- SC2086: Double quote to prevent globbing.\n"

[[tests.shellcheck]]
name = "empty input passes through"
input = ""
expected = ""
