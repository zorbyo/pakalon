# trunk.io check / fmt output.
# Strip download / install chatter, keep issues + summary.

[filters.trunk]
description = "Compact trunk check / fmt output"
match_command = "^trunk$"
strip_ansi = true
strip_lines_matching = [
	"^\\s*$",
	"^\\s*Downloading ",
	"^\\s*Installing ",
	"^\\s*Checking \\.\\.\\.",
]
truncate_lines_at = 250
max_lines = 80
on_empty = "trunk: ok"

[[tests.trunk]]
name = "keeps issues and summary"
input = "Checking ...\nIssues:\n  file.py:10:5  message [linter]\n\nChecked 3 files\n"
expected = "Issues:\n  file.py:10:5  message [linter]\nChecked 3 files\n"

[[tests.trunk]]
name = "install only"
input = "Downloading tools\nInstalling ruff\n\n"
expected = "trunk: ok"
