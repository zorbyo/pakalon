autoexamples = false
autotests = false
autobenches = false
description = "Reusable core of a POSIX/bash shell (used by brush-shell)"
readme = "README.md"
keywords = [
    "cli",
    "shell",
    "sh",
    "bash",
    "script",
]
categories = [
    "command-line-utilities",
    "development-tools",
]
license = "MIT"
repository = "https://github.com/reubeno/brush"

[features]
