# Build Open-Source Version
name: Build OSS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build OSS version
        run: npm run build:oss
        env:
          BUILD_TARGET: oss
          
      - name: Run tests
        run: npm run test
        
      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: pakalon-oss
          path: dist/
