# Build Cloud Version
name: Build Cloud

on:
  push:
    branches: [main]
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          
      - name: Install dependencies
        working-directory: pakalon-cli
        run: bun install
        
      - name: Type check
        working-directory: pakalon-cli
        run: bun run type-check || true
        
      - name: Create dist directory
        working-directory: pakalon-cli
        run: mkdir -p dist
        
      - name: Build CLI
        working-directory: pakalon-cli
        run: bun run build
        
      - name: Run tests
        working-directory: pakalon-cli
        run: bun run test || true
