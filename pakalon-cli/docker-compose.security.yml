# Docker Compose for Phase 4 Security Testing Tools
# Run baseline static scanners (no profile required):
#   docker compose -f docker-compose.security.yml up -d
# Run the full suite, including runtime scanners:
#   docker compose -f docker-compose.security.yml --profile full up -d
# Run only runtime scanners:
#   docker compose -f docker-compose.security.yml --profile dast up -d
# Or run a specific tool:
#   docker compose -f docker-compose.security.yml up semgrep

x-dast-defaults: &dast-defaults
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    SECURITY_TARGET_URL: ${SECURITY_TARGET_URL:-http://host.docker.internal:3000}
    SECURITY_TARGET_HOST: ${SECURITY_TARGET_HOST:-host.docker.internal}

services:
  # DeepSec - Local SAST/Dependency/Config scanning
  deepsec:
    image: oven/bun:1.1.38
    container_name: pakalon-deepsec
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon-agents/phase-4
        TARGET_DIR="$${SECURITY_TARGET_PATH:-/src}"
        if [ ! -d "$${TARGET_DIR}" ]; then TARGET_DIR=/src; fi
        bun -e "import { scanForVulnerabilities } from './src/deepsec/scanner/index.ts'; import fs from 'node:fs/promises'; const target = process.env.SECURITY_TARGET_PATH || '/src'; const out = '/src/.pakalon-agents/phase-4/deepsec-report.json'; const findings = await scanForVulnerabilities(target); await fs.writeFile(out, JSON.stringify({ target, generatedAt: new Date().toISOString(), findings }, null, 2)); console.log('[deepsec] wrote ' + findings.length + ' findings to ' + out);"
    profiles:
      - full

  # Semgrep - Static Application Security Testing
  semgrep:
    image: returntocorp/semgrep:latest
    container_name: pakalon-semgrep
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        targets=""
        for candidate in app scripts src; do
          if [ -d "/src/$$candidate" ]; then
            targets="$$targets /src/$$candidate"
          fi
        done
        if [ -z "$$targets" ]; then
          echo "{}" > /src/.pakalon/semgrep-results.json
          echo "[semgrep] No source directories found to scan."
          exit 0
        fi
        semgrep --config=auto --json --output=/src/.pakalon/semgrep-results.json --exclude /src/node_modules --exclude /src/dist --exclude /src/.venv --exclude /src/.git --exclude /src/.pakalon-agents $$targets
        exit_code=$$?
        if [ "$$exit_code" -le 1 ]; then
          echo "[semgrep] Scan completed. Review /src/.pakalon/semgrep-results.json for findings."
          exit 0
        fi
        exit "$$exit_code"

  # Gitleaks - Secrets Detection
  gitleaks:
    image: zricethezav/gitleaks:latest
    container_name: pakalon-gitleaks
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        gitleaks detect --source=. --report-format=json --report-path=/src/.pakalon/gitleaks-results.json
        exit_code=$$?
        if [ "$$exit_code" -le 1 ]; then
          echo "[gitleaks] Scan completed. Review /src/.pakalon/gitleaks-results.json for findings."
          exit 0
        fi
        exit "$$exit_code"

  # OWASP ZAP - Dynamic Application Security Testing
  zap:
    <<: *dast-defaults
    image: owasp/zap2docker-stable:latest
    container_name: pakalon-zap
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /src/.pakalon && zap.sh -cmd -quickurl \"$$SECURITY_TARGET_URL\" -quickout /src/.pakalon/zap-results.xml"
    profiles:
      - dast
      - full

  # Nikto - Web Server Scanner
  nikto:
    <<: *dast-defaults
    image: threatbox/nikto:latest
    container_name: pakalon-nikto
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /src/.pakalon && nikto -h \"$$SECURITY_TARGET_HOST\" -Format json -output /src/.pakalon/nikto-results.json"
    profiles:
      - dast
      - full

  # Nmap - Network Scanner
  nmap:
    <<: *dast-defaults
    image: instrumentisto/nmap:latest
    container_name: pakalon-nmap
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /src/.pakalon && nmap -sV -oX /src/.pakalon/nmap-results.xml \"$$SECURITY_TARGET_HOST\""
    profiles:
      - dast
      - full

  # sqlmap - SQL Injection Testing
  sqlmap:
    <<: *dast-defaults
    image: projectdiscovery/sqlmap-api:latest
    container_name: pakalon-sqlmap
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /src/.pakalon && sqlmap --batch -u \"$$SECURITY_TARGET_URL\" --output-dir=/src/.pakalon/sqlmap-results"
    profiles:
      - dast
      - full

  # Wapiti - Web App Scanner
  wapiti:
    <<: *dast-defaults
    image: hackerspacekrk/wapiti:latest
    container_name: pakalon-wapiti
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /src/.pakalon && wapiti -u \"$$SECURITY_TARGET_URL\" -f json -o /src/.pakalon/wapiti-results.json"
    profiles:
      - dast
      - full

  # Nuclei - HTTP Exposure Scanner
  xsstrike:
    <<: *dast-defaults
    image: projectdiscovery/nuclei:latest
    container_name: pakalon-xsstrike
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "mkdir -p /src/.pakalon && nuclei -u \"$$SECURITY_TARGET_URL\" -jsonl -o /src/.pakalon/nuclei-results.jsonl || true"
    profiles:
      - dast
      - full

  # SonarQube - Code Quality and Security
  sonarqube:
    image: sonarqube:community
    container_name: pakalon-sonarqube
    volumes:
      - ./:/src
      - sonar_data:/opt/sonarqube/data
      - sonar_extensions:/opt/sonarqube/extensions
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        if command -v sonar-scanner >/dev/null 2>&1; then
          sonar-scanner -Dsonar.projectBaseDir=/src -Dsonar.sources=. -Dsonar.host.url=http://host.docker.internal:9000 -Dsonar.login=$${SONAR_TOKEN:-dummy} -Dsonar.report.export.path=/src/.pakalon/sonarqube-results.json || true
        else
          echo '{"issues":[]}' > /src/.pakalon/sonarqube-results.json
          echo "[sonarqube] sonar-scanner not present in image; wrote placeholder results."
        fi
    profiles:
      - full

  # FindSecBugs - Java Security Scanner
  findsecbugs:
    image: maven:3.9-eclipse-temurin-21
    container_name: pakalon-findsecbugs
    volumes:
      - ./:/src
      - m2_cache:/root/.m2
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        if [ -z "$$(find /src -name '*.java' -o -name 'pom.xml' | head -n 1)" ]; then
          echo '{"issues":[]}' > /src/.pakalon/findsecbugs-results.json
          echo "[findsecbugs] No Java project detected; skipping."
          exit 0
        fi
        echo '{"issues":[]}' > /src/.pakalon/findsecbugs-results.json
        echo "[findsecbugs] Placeholder results written; wire your Maven FindSecBugs execution here."
    profiles:
      - full

  # Brakeman - Rails Security Scanner
  brakeman:
    image: ruby:3.2
    container_name: pakalon-brakeman
    volumes:
      - ./:/src
      - bundle_cache:/usr/local/bundle
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        if [ -z "$$(find /src -name 'Gemfile' | head -n 1)" ]; then
          echo '{"issues":[]}' > /src/.pakalon/brakeman-results.json
          echo "[brakeman] No Rails project detected; skipping."
          exit 0
        fi
        gem install brakeman -N
        brakeman -q -o /src/.pakalon/brakeman-results.json -f json || true
    profiles:
      - full

  # ESLint Security - JS/TS Security Rules
  eslint-security:
    image: node:20
    container_name: pakalon-eslint-security
    volumes:
      - ./:/src
      - node_modules_cache:/src/node_modules
    working_dir: /src
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        if [ ! -f package.json ]; then
          echo '[]' > /src/.pakalon/eslint-security-results.json
          echo "[eslint-security] package.json not found; skipping."
          exit 0
        fi
        npm install -g eslint eslint-plugin-security >/dev/null 2>&1
        eslint . --ext .js,.jsx,.ts,.tsx --plugin security --rule 'security/detect-object-injection:error' --format json --output-file /src/.pakalon/eslint-security-results.json || true
    profiles:
      - full

  # TypeScript-only placeholder for legacy scanner slot
  bandit:
    image: node:20-alpine
    container_name: pakalon-bandit
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["sh", "-c"]
    command:
      - "mkdir -p .pakalon && node -e \"require('fs').writeFileSync('.pakalon/bandit-results.json', JSON.stringify({ skipped: true, reason: 'TypeScript runtime scanner slot is handled by Semgrep and Deepsec' }, null, 2))\""

  # Security Headers Checker (custom)
  security-headers:
    <<: *dast-defaults
    image: node:20-alpine
    container_name: pakalon-security-headers
    volumes:
      - ./:/src
    working_dir: /src
    entrypoint: ["sh", "-c"]
    command:
      - |
        mkdir -p /src/.pakalon
        node -e "const fs=require('fs');const target=process.env.SECURITY_TARGET_URL;fetch(target).then(r=>{const h=r.headers;const required=['content-security-policy','strict-transport-security','x-content-type-options','x-frame-options','referrer-policy'];const missing=required.filter(k=>!h.has(k));fs.writeFileSync('/src/.pakalon/security-headers-results.json',JSON.stringify({target_url:target,status_code:r.status,missing_headers:missing,present_headers:Object.fromEntries(h.entries())},null,2));}).catch(e=>{fs.writeFileSync('/src/.pakalon/security-headers-results.json',JSON.stringify({target_url:target,error:String(e),missing_headers:[]},null,2));process.exit(0);})"
    profiles:
      - dast
      - full

networks:
  default:
    name: pakalon-security

volumes:
  sonar_data:
  sonar_extensions:
  m2_cache:
  bundle_cache:
  node_modules_cache:
